<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cierre Contable · Inversiones Bolívar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#1B3A6B; --navy-dk:#122A4E; --navy-lt:#274B85;
  --green:#00A651; --green-dk:#00803E; --green-bg:#E7F8EF;
  --orange:#FA8D29; --orange-bg:#FFF1E2;
  --slate:#8A97AC; --slate-bg:#F0F2F5;
  --purple:#6C6FA0; --purple-bg:#EDEDF7;
  --bg:#F4F6F9; --card:#FFFFFF; --border:#E3E8EF;
  --text:#182335; --text-soft:#5C6B84; --text-faint:#93A0B4;
  --danger:#D64550; --danger-bg:#FCEBEC;
  --radius:14px; --radius-sm:9px;
  --shadow: 0 1px 2px rgba(20,30,50,.04), 0 4px 16px rgba(20,30,50,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  background:var(--bg); color:var(--text); font-size:14.5px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:1240px; margin:0 auto; padding:0 22px 60px;}
::selection{background:var(--green-bg); color:var(--navy-dk);}

/* ---------- Banner demo ---------- */
.demo-banner{
  background:linear-gradient(90deg,#FFF6E8,#FFF1E2); border-bottom:1px solid #F3D8A8;
  color:#8A5A15; font-size:12.5px; padding:8px 22px; display:flex; align-items:center; gap:8px;
  justify-content:center; font-weight:600;
}
.demo-banner svg{flex:none;}

/* ---------- Header ---------- */
header.top{
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 0 16px; gap:16px; flex-wrap:wrap;
}
.brand{display:flex; align-items:center; gap:12px;}
.brand-mark{
  width:42px; height:42px; border-radius:11px;
  background:linear-gradient(135deg,var(--navy),var(--navy-lt));
  display:flex; align-items:center; justify-content:center; flex:none;
  box-shadow:0 4px 12px rgba(27,58,107,.28);
}
.brand h1{font-size:17.5px; margin:0; font-weight:700; color:var(--navy-dk); letter-spacing:-.2px;}
.brand p{margin:1px 0 0; font-size:12px; color:var(--text-faint); font-weight:600; letter-spacing:.3px; text-transform:uppercase;}

.head-right{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
select.cycle-select{
  appearance:none; -webkit-appearance:none; border:1.5px solid var(--border); background:var(--card) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M1 1l4 4 4-4" stroke="%235C6B84" stroke-width="1.6" fill="none"/></svg>') no-repeat right 12px center;
  padding:9px 32px 9px 14px; border-radius:10px; font-size:13.5px; font-weight:600; color:var(--navy-dk); cursor:pointer;
}
select.cycle-select:focus{outline:2px solid var(--green); outline-offset:1px;}

.user-chip{
  display:flex; align-items:center; gap:9px; background:var(--card); border:1.5px solid var(--border);
  padding:6px 14px 6px 6px; border-radius:100px; cursor:default;
}
.avatar{
  width:30px; height:30px; border-radius:50%; background:var(--navy); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:700; flex:none;
}
.user-chip .u-name{font-size:13px; font-weight:600; color:var(--text); line-height:1.15;}
.user-chip .u-role{font-size:10.5px; color:var(--text-faint); font-weight:600; text-transform:uppercase; letter-spacing:.3px;}
.admin-tag{background:var(--orange-bg); color:#95560D; font-size:9.5px; font-weight:800; padding:2px 7px; border-radius:100px; letter-spacing:.4px; text-transform:uppercase; margin-left:2px;}

/* ---------- Nav tabs ---------- */
nav.tabs{display:flex; gap:4px; border-bottom:1.5px solid var(--border); margin-bottom:26px;}
nav.tabs button{
  background:none; border:none; padding:12px 6px; margin-right:22px; font-size:14px; font-weight:650;
  color:var(--text-faint); cursor:pointer; position:relative; top:1.5px; font-family:inherit;
}
nav.tabs button.active{color:var(--navy-dk); border-bottom:2.5px solid var(--green);}
nav.tabs button:hover:not(.active){color:var(--text-soft);}

/* ---------- Cards / generic ---------- */
.card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow);}
.section-title{font-size:15.5px; font-weight:700; color:var(--navy-dk); margin:0 0 3px; letter-spacing:-.1px;}
.section-sub{font-size:12.5px; color:var(--text-faint); margin:0 0 16px;}
.btn{
  display:inline-flex; align-items:center; gap:7px; border:none; border-radius:9px; padding:9px 16px;
  font-size:13px; font-weight:650; cursor:pointer; font-family:inherit; transition:transform .08s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--navy); color:#fff;}
.btn-primary:hover{background:var(--navy-dk);}
.btn-ghost{background:var(--card); color:var(--navy-dk); border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--navy-lt); background:#FAFBFD;}
.btn-green{background:var(--green); color:#fff;}
.btn-green:hover{background:var(--green-dk);}
.btn-sm{padding:6px 12px; font-size:12px; border-radius:7px;}

/* ---------- Pills / estado ---------- */
.pill{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:4px 10px 4px 8px; border-radius:100px; white-space:nowrap;}
.pill .dot{width:6px; height:6px; border-radius:50%;}
.pill.Completado{background:var(--green-bg); color:var(--green-dk);} .pill.Completado .dot{background:var(--green);}
.pill.Enproceso{background:var(--orange-bg); color:#95560D;} .pill.Enproceso .dot{background:var(--orange);}
.pill.Noiniciado{background:var(--slate-bg); color:#5B6779;} .pill.Noiniciado .dot{background:var(--slate);}
.pill.Noaplica{background:var(--purple-bg); color:#4E4F86;} .pill.Noaplica .dot{background:var(--purple);}

select.estado-select{
  border:1.5px solid var(--border); border-radius:8px; padding:5px 26px 5px 10px; font-size:12px; font-weight:700;
  font-family:inherit; cursor:pointer; appearance:none; -webkit-appearance:none;
  background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="9" height="6"><path d="M1 1l3.5 3.5L8 1" stroke="%235C6B84" stroke-width="1.5" fill="none"/></svg>') no-repeat right 9px center;
}
select.estado-select.Completado{background-color:var(--green-bg); color:var(--green-dk); border-color:#BFE9D2;}
select.estado-select.Enproceso{background-color:var(--orange-bg); color:#95560D; border-color:#F6D6AA;}
select.estado-select.Noiniciado{background-color:var(--slate-bg); color:#5B6779; border-color:var(--border);}
select.estado-select.Noaplica{background-color:var(--purple-bg); color:#4E4F86; border-color:#D6D6EF;}

/* ---------- Progress bar ---------- */
.pbar-track{height:7px; border-radius:100px; background:var(--slate-bg); overflow:hidden; position:relative;}
.pbar-fill{height:100%; border-radius:100px; background:linear-gradient(90deg,var(--green),#1EC876); transition:width .4s ease;}

/* ---------- Stamp (signature element) ---------- */
.stamp{width:52px; height:52px; opacity:.9; mix-blend-mode:multiply; transform:rotate(-9deg); flex:none;}

/* ---------- Mis tareas ---------- */
.mt-head{display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:22px;}
.mt-progress-card{
  background:linear-gradient(120deg,var(--navy),var(--navy-lt)); border-radius:var(--radius); padding:20px 24px;
  color:#fff; display:flex; align-items:center; gap:22px; flex-wrap:wrap; position:relative; overflow:hidden;
}
.mt-progress-card::after{content:''; position:absolute; right:-40px; top:-40px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.05);}
.mt-progress-num{font-size:34px; font-weight:800; letter-spacing:-1px;}
.mt-progress-label{font-size:12.5px; opacity:.8; font-weight:600;}
.mt-progress-card .pbar-track{background:rgba(255,255,255,.18); flex:1; min-width:140px;}
.mt-progress-card .pbar-fill{background:#fff;}

.modulo-group{margin-bottom:16px;}
.modulo-head{display:flex; align-items:center; gap:10px; padding:13px 4px 9px;}
.modulo-head h3{font-size:14px; margin:0; font-weight:700; color:var(--navy-dk); flex:1;}
.modulo-head .m-count{font-size:11.5px; color:var(--text-faint); font-weight:600;}
.task-row{
  display:grid; grid-template-columns:1fr auto auto; gap:14px; align-items:center;
  padding:13px 16px; border-bottom:1px solid var(--border);
}
.task-row:last-child{border-bottom:none;}
.task-title{font-size:13.5px; font-weight:600; color:var(--text);}
.task-meta{font-size:11.5px; color:var(--text-faint); margin-top:2px;}
.task-meta.overdue{color:var(--danger); font-weight:700;}

/* ---------- Dashboard ---------- */
.kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;}
.kpi-card{padding:18px 20px;}
.kpi-num{font-size:27px; font-weight:800; color:var(--navy-dk); letter-spacing:-.5px;}
.kpi-label{font-size:12px; color:var(--text-faint); font-weight:650; margin-top:2px;}
.kpi-card.accent .kpi-num{color:var(--green-dk);}
.kpi-card.warn .kpi-num{color:var(--danger);}

.dash-grid{display:grid; grid-template-columns:1.15fr .85fr; gap:16px; margin-bottom:16px;}
.chart-card{padding:20px 22px;}
.chart-card canvas{max-height:230px;}

.mod-bar-row{display:grid; grid-template-columns:190px 1fr 48px; gap:12px; align-items:center; padding:8px 0;}
.mod-bar-row .m-name{font-size:12.5px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.mod-bar-row .m-pct{font-size:12px; font-weight:700; color:var(--text-soft); text-align:right;}
.stack-track{height:10px; border-radius:100px; background:var(--slate-bg); display:flex; overflow:hidden;}
.stack-seg{height:100%;}

table.persons{width:100%; border-collapse:collapse; font-size:12.8px;}
table.persons th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.3px; color:var(--text-faint); font-weight:700; padding:8px 10px; border-bottom:1.5px solid var(--border);}
table.persons td{padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle;}
table.persons tr:last-child td{border-bottom:none;}
.p-name{font-weight:650; display:flex; align-items:center; gap:8px;}
.mini-bar{width:80px; height:6px; border-radius:100px; background:var(--slate-bg); overflow:hidden; display:inline-block;}
.mini-bar > div{height:100%; background:var(--green);}

.overdue-list{padding:18px 20px;}
.overdue-item{display:flex; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:12.5px;}
.overdue-item:last-child{border-bottom:none;}
.overdue-item .oi-days{color:var(--danger); font-weight:800; font-size:11.5px; white-space:nowrap;}

/* ---------- Panel de control ---------- */
.locked-box{padding:60px 30px; text-align:center; color:var(--text-faint);}
.locked-box svg{margin-bottom:14px;}
.locked-box h3{color:var(--navy-dk); font-size:16px; margin:0 0 6px;}
.locked-box p{font-size:13px; max-width:340px; margin:0 auto;}

table.panel{width:100%; border-collapse:collapse; font-size:12.6px;}
table.panel th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.3px; color:var(--text-faint); font-weight:700; padding:9px 10px; border-bottom:1.5px solid var(--border); position:sticky; top:0; background:var(--card);}
table.panel td{padding:7px 10px; border-bottom:1px solid var(--border); vertical-align:middle;}
table.panel input[type=date]{border:1.5px solid var(--border); border-radius:7px; padding:5px 7px; font-size:12px; font-family:inherit; width:128px;}
table.panel input[type=date]:focus{outline:2px solid var(--green); outline-offset:0;}
.panel-scroll{max-height:560px; overflow:auto; border:1px solid var(--border); border-radius:var(--radius-sm);}
.row-saved{background:var(--green-bg) !important; transition:background 1.2s ease;}

/* ---------- Toast ---------- */
#toast-wrap{position:fixed; bottom:22px; right:22px; z-index:999; display:flex; flex-direction:column; gap:10px; align-items:flex-end;}
.toast{
  background:var(--navy-dk); color:#fff; padding:14px 18px; border-radius:12px; font-size:13px; font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,.25); display:flex; align-items:center; gap:10px; max-width:340px;
  animation:toast-in .3s ease;
}
.toast.success{background:linear-gradient(120deg,var(--green-dk),var(--green));}
@keyframes toast-in{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);}}

.empty-state{padding:50px 20px; text-align:center; color:var(--text-faint); font-size:13px;}

footer.foot{text-align:center; padding:30px 0 10px; font-size:11.5px; color:var(--text-faint);}

@media (max-width:880px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .dash-grid{grid-template-columns:1fr;}
  .task-row{grid-template-columns:1fr; align-items:flex-start;}
}
</style>
</head>

   Mismo patrón que la herramienta de Grupo de Sola. Si no hay sesión SWA
   (por ejemplo mientras pruebas el archivo suelto), cae a modo demo.
   ========================================================================= */
async function initAuth(){
  try{
    const res = await fetch('/.auth/me');
    if(res.ok){
      const data = await res.json();
      const p = data && data.clientPrincipal;
      if(p && p.userDetails){
        const email = p.userDetails.toLowerCase();
        const name = Object.keys(EMPLEADOS).find(n => EMPLEADOS[n].toLowerCase() === email);
        currentUser = { name: name || p.userDetails, email, isAdmin: ADMIN_EMAILS.includes(email) };
        demoMode = false;
        return;
      }
    }
  }catch(e){ /* sin SWA/Easy Auth disponible -> demo */ }
  currentUser = null;
}

/* =========================================================================
   CAPA DE DATOS — histórico fijo + ciclo(s) vivo(s) generados desde
   TASK_TEMPLATE, combinados con overrides de Power Automate si están conectados
   ========================================================================= */
function configuredUrl(u){ return u && !u.startsWith('REEMPLAZAR'); }

function nextCycle(c){
  let [y,m] = c.split('-').map(Number);
  m++; if(m>12){ m=1; y++; }
  return `${y}-${String(m).padStart(2,'0')}`;
}
const HIST_CYCLES = [...new Set(SEED_HISTORICO.map(t=>t.ciclo))].sort();
const LIVE_START_CYCLE = nextCycle(HIST_CYCLES[HIST_CYCLES.length-1]);

function getLiveCycles(){
  const out = [];
  let c = LIVE_START_CYCLE;
  const hoy = todayISO().slice(0,7);
  while(c <= hoy){ out.push(c); c = nextCycle(c); }
  if(out.length===0) out.push(LIVE_START_CYCLE);
  return out;
}

function buildCycleFromTemplate(ciclo, overrides, idStart){
  const [y,m] = ciclo.split('-');
  let nextId = idStart;
  return TASK_TEMPLATE.map(t=>{
    const ov = overrides[t.k] || {};
    const fechaLimiteDefault = t.diaLimite ? `${y}-${m}-${String(t.diaLimite).padStart(2,'0')}` : null;
    return {
      id: nextId++,
      taskKey: t.k,
      titulo: t.titulo,
      tarea: t.tarea,
      asignado: ov.asignado || t.asignado,
      fechaInicio: ov.fechaInicio || `${y}-${m}-01`,
      fechaLimite: ov.fechaLimite !== undefined ? ov.fechaLimite : fechaLimiteDefault,
      estado: ov.estado || 'No iniciado',
      ciclo, cicloLabel: cicloLabel(ciclo)
    };
  });
}

async function fetchEstadoCiclo(ciclo){
  if(configuredUrl(API.getEstadoCiclo)){
    try{
      const res = await fetch(`${API.getEstadoCiclo}${API.getEstadoCiclo.includes('?')?'&':'?'}ciclo=${ciclo}`);
      if(res.ok){
        const rows = await res.json();
        const map = {};
        (rows||[]).forEach(r=>{ map[r.taskKey] = r; });
        return map;
      }
    }catch(e){ console.warn('No se pudo leer el estado del ciclo '+ciclo+', usando plantilla base.', e); }
  }
  return {};
}

async function loadTareas(){
  allTasks = SEED_HISTORICO.map(t=>({...t}));
  let nextId = allTasks.length + 1;
  for(const ciclo of getLiveCycles()){
    const overrides = await fetchEstadoCiclo(ciclo);
    const tareas = buildCycleFromTemplate(ciclo, overrides, nextId);
    nextId += tareas.length;
    allTasks = allTasks.concat(tareas);
  }
}

async function persistEstado(task){
  if(!task.taskKey) return;
  if(configuredUrl(API.updateEstado)){
    try{
      await fetch(API.updateEstado, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ciclo:task.ciclo, taskKey:task.taskKey, estado:task.estado, modificadoPor: currentUser?.email || 'demo' })});
    }catch(e){ console.warn('No se pudo guardar en SharePoint (modo demo).', e); }
  }
}
async function persistFechas(task){
  if(!task.taskKey) return;
  if(configuredUrl(API.updateFechas)){
    try{
      await fetch(API.updateFechas, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ciclo:task.ciclo, taskKey:task.taskKey, fechaInicio:task.fechaInicio, fechaLimite:task.fechaLimite, modificadoPor: currentUser?.email || 'demo' })});
    }catch(e){ console.warn('No se pudo guardar fechas en SharePoint (modo demo).', e); }

/* =========================================================================
   HELPERS DE DATOS
   ========================================================================= */
function getCycles(){ return [...new Set(allTasks.map(t=>t.ciclo))].filter(Boolean).sort(); }
function tasksForCycle(c){ return allTasks.filter(t=>t.ciclo===c); }
function isOverdue(t){ return t.fechaLimite && t.estado!=='Completado' && t.estado!=='No aplica' && t.fechaLimite < todayISO(); }
function daysOverdue(t){ const d1=new Date(t.fechaLimite), d2=new Date(todayISO()); return Math.round((d2-d1)/86400000); }
function pctClass(e){ return e.replace(/\s/g,''); }

function computeStats(tasks){
  const relevant = tasks.filter(t=>!NO_CUENTAN.includes(t.estado));
  const completado = tasks.filter(t=>t.estado==='Completado').length;
  const enProceso = tasks.filter(t=>t.estado==='En proceso').length;
  const noIniciado = tasks.filter(t=>t.estado==='No iniciado').length;
  const noAplica = tasks.filter(t=>t.estado==='No aplica').length;
  const total = tasks.length;
  const pct = relevant.length ? Math.round(100*completado/relevant.length) : 0;
  return {total, completado, enProceso, noIniciado, noAplica, pct, relevant: relevant.length};
}

function checkPersonComplete(name, ciclo){
  const key = name+'|'+ciclo;
  const tasks = allTasks.filter(t=>t.asignado===name && t.ciclo===ciclo);
  const relevant = tasks.filter(t=>!NO_CUENTAN.includes(t.estado));
  const done = relevant.length>0 && relevant.every(t=>t.estado==='Completado');
  if(done && !notifiedThisSession.has(key)){
    notifiedThisSession.add(key);
    showToast(`${name} completó el 100% de sus tareas — ${cicloLabel(ciclo)}`, true);
    persistNotificacion(name, ciclo, relevant.length);
  }
}

  let html = `<div class="mt-head">
    <div class="mt-progress-card" style="flex:1">
      <div><div class="mt-progress-num">${stats.pct}%</div><div class="mt-progress-label">completado</div></div>
      <div class="pbar-track"><div class="pbar-fill" style="width:${stats.pct}%"></div></div>
      <div style="font-size:12.5px; opacity:.85; font-weight:600;">${stats.completado} de ${stats.relevant} tareas · ${cicloLabel(currentCycle)}</div>
    </div>
    <button class="btn btn-ghost" id="mt-export"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3v13m0 0 4-4m-4 4-4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Descargar mis tareas</button>
  </div>`;

  Object.keys(byModulo).forEach(mod=>{
    const items = byModulo[mod];
    const s = computeStats(items);
    html += `<div class="modulo-group card">
      <div class="modulo-head">
        <h3>${mod}</h3>
        ${s.pct===100?`<div style="width:34px;height:34px;overflow:hidden;margin-right:2px;">${stampSVG()}</div>`:''}
        <span class="m-count">${s.completado}/${s.relevant} · ${s.pct}%</span>
      </div>
      ${items.map(t=>taskRowHTML(t)).join('')}
    </div>`;
  });

  view.innerHTML = html;
  view.querySelectorAll('select.estado-select').forEach(sel=>{
    sel.onchange = async (e)=>{
      const id = parseInt(e.target.dataset.id);
      const task = allTasks.find(x=>x.id===id);
      task.estado = e.target.value;
      e.target.className = 'estado-select ' + pctClass(task.estado);
      await persistEstado(task);
      checkPersonComplete(task.asignado, task.ciclo);
      renderMisTareas();
    };
  });
  document.getElementById('mt-export').onclick = ()=> exportTasks(mine, `Mis_Tareas_${currentUser.name.replace(/\s/g,'_')}_${currentCycle}`);
}

function taskRowHTML(t){
  const overdue = isOverdue(t);
  return `<div class="task-row">
    <div>
      <div class="task-title">${t.tarea}</div>
      <div class="task-meta ${overdue?'overdue':''}">${overdue?`⚠ Vencida hace ${daysOverdue(t)} día(s) · `:''}Límite: ${fmtDate(t.fechaLimite)}</div>
    </div>
    <select class="estado-select ${pctClass(t.estado)}" data-id="${t.id}">
      ${['No iniciado','En proceso','Completado','No aplica'].map(op=>`<option value="${op}" ${t.estado===op?'selected':''}>${op}</option>`).join('')}
    </select>
    <span></span>
  </div>`;
}

/* =========================================================================
   VISTA: DASHBOARD
   ========================================================================= */
let chartDonut=null, chartMods=null;
function renderDashboard(){
  const view = document.getElementById('view');
  const tasks = tasksForCycle(currentCycle);
  const stats = computeStats(tasks);
  const overdue = tasks.filter(isOverdue).sort((a,b)=>daysOverdue(b)-daysOverdue(a));

  const personNames = [...new Set(tasks.map(t=>t.asignado))];
  const personRows = personNames.map(n=>{
    const pt = tasks.filter(t=>t.asignado===n);
    const s = computeStats(pt);
    return {n, ...s};
  }).sort((a,b)=> b.pct-a.pct);

  const moduloNames = [...new Set(tasks.map(t=>t.titulo))];
  const moduloRows = moduloNames.map(m=>{
    const mt = tasks.filter(t=>t.titulo===m);
    const s = computeStats(mt);
    return {m, ...s};
  });

  view.innerHTML = `
    <div class="mt-head" style="margin-bottom:18px;">
      <div></div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-ghost btn-sm" id="dash-export-cycle">Exportar ${cicloLabel(currentCycle)}</button>
        <button class="btn btn-ghost btn-sm" id="dash-export-all">Exportar histórico completo</button>
      </div>
    </div>
    <div class="kpi-grid">
      <div class="card kpi-card"><div class="kpi-num">${stats.total}</div><div class="kpi-label">Tareas totales · ${cicloLabel(currentCycle)}</div></div>
      <div class="card kpi-card accent"><div class="kpi-num">${stats.pct}%</div><div class="kpi-label">Avance del cierre</div></div>
      <div class="card kpi-card"><div class="kpi-num">${personRows.filter(p=>p.pct===100).length}/${personRows.length}</div><div class="kpi-label">Personas al 100%</div></div>
      <div class="card kpi-card ${overdue.length?'warn':''}"><div class="kpi-num">${overdue.length}</div><div class="kpi-label">Tareas vencidas</div></div>
    </div>
    <div class="dash-grid">
      <div class="card chart-card">
        <div class="section-title">Avance por módulo</div>
        <div class="section-sub">% de tareas completadas sobre el total aplicable</div>
        <div id="mod-bars"></div>
      </div>
      <div class="card chart-card">
        <div class="section-title">Estado general</div>
        <div class="section-sub">${cicloLabel(currentCycle)}</div>
        <canvas id="donut-chart"></canvas>
      </div>
    </div>
    <div class="dash-grid">
      <div class="card" style="padding:20px 22px;">
        <div class="section-title">Avance por persona</div>
        <div class="section-sub">Ordenado por % completado</div>
        <table class="persons"><thead><tr><th>Persona</th><th>Progreso</th><th>Tareas</th><th></th></tr></thead>
        <tbody>${personRows.map(p=>`<tr>
          <td class="p-name">${p.n}${p.pct===100?'<span style=\"font-size:14px\">🟢</span>':''}</td>
          <td><span class="mini-bar"><div style="width:${p.pct}%"></div></span></td>
          <td style="color:var(--text-faint);font-weight:600;">${p.completado}/${p.relevant}</td>
          <td style="font-weight:800;color:var(--navy-dk);text-align:right;">${p.pct}%</td>
        </tr>`).join('')}</tbody></table>
      </div>
      <div class="card overdue-list">
        <div class="section-title">Tareas vencidas</div>
        <div class="section-sub">Fecha límite superada y aún sin completar</div>
        ${overdue.length===0 ? '<div style="color:var(--text-faint); font-size:12.5px; padding:14px 0;">Sin tareas vencidas en este ciclo ✅</div>' :
          overdue.slice(0,10).map(t=>`<div class="overdue-item">
            <div><strong>${t.tarea}</strong><br><span style="color:var(--text-faint)">${t.asignado} · ${t.titulo}</span></div>
            <div class="oi-days">${daysOverdue(t)}d</div>
          </div>`).join('')}
      </div>
    </div>
  `;

  document.getElementById('mod-bars').innerHTML = moduloRows.map(r=>{
    const segs = [
      {k:'Completado', color:'#00A651', v:r.completado},
      {k:'En proceso', color:'#FA8D29', v:r.enProceso},
      {k:'No iniciado', color:'#C9D1DE', v:r.noIniciado},
      {k:'No aplica', color:'#B9BAE0', v:r.noAplica},
    ];
    return `<div class="mod-bar-row">
      <div class="m-name">${r.m}${r.pct===100?' 🟢':''}</div>
      <div class="stack-track">${segs.map(s=>s.v?`<div class="stack-seg" style="width:${100*s.v/r.total}%;background:${s.color}"></div>`:'').join('')}</div>
      <div class="m-pct">${r.pct}%</div>
    </div>`;
  }).join('');

  if(chartDonut) chartDonut.destroy();
  chartDonut = new Chart(document.getElementById('donut-chart'), {
    type:'doughnut',
    data:{ labels:['Completado','En proceso','No iniciado','No aplica'],
      datasets:[{ data:[stats.completado,stats.enProceso,stats.noIniciado,stats.noAplica],
        backgroundColor:['#00A651','#FA8D29','#C9D1DE','#B9BAE0'], borderWidth:0 }]},
    options:{ plugins:{legend:{position:'bottom', labels:{boxWidth:9, font:{size:11.5, family:'Segoe UI'}, color:'#5C6B84'}}}, cutout:'68%', maintainAspectRatio:true }
  });

  document.getElementById('dash-export-cycle').onclick = ()=> exportTasks(tasks, `Cierre_Contable_${currentCycle}`);
  document.getElementById('dash-export-all').onclick = ()=> exportTasks(allTasks, `Cierre_Contable_Historico_Completo`);
}

/* =========================================================================
   VISTA: PANEL DE CONTROL (solo Derlin De León)
   ========================================================================= */
function renderPanel(){
  const view = document.getElementById('view');
  if(!currentUser || !currentUser.isAdmin){
    view.innerHTML = `<div class="card locked-box">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="#93A0B4" stroke-width="1.7"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="#93A0B4" stroke-width="1.7"/></svg>
      <h3>Acceso restringido</h3>
      <p>Solo Derlin De León puede modificar las fechas del cierre contable.</p>
    </div>`;
    return;
  }
  const tasks = tasksForCycle(currentCycle).slice().sort((a,b)=> a.titulo.localeCompare(b.titulo));

  view.innerHTML = `
    <div class="mt-head" style="align-items:flex-start;">
      <div>
        <div class="section-title">Panel de control — ${cicloLabel(currentCycle)}</div>
        <div class="section-sub">Edita fechas de inicio y límite. Los cambios se guardan por fila.</div>
      </div>

    </div>
    <div class="card panel-scroll">
      <table class="panel">
        <thead><tr><th>Módulo</th><th>Tarea</th><th>Asignado</th><th>Fecha inicio</th><th>Fecha límite</th><th>Estado</th><th></th></tr></thead>
        <tbody id="panel-body">
          ${tasks.map(t=>`<tr id="row-${t.id}">
            <td style="max-width:170px;">${t.titulo}</td>
            <td style="max-width:230px;">${t.tarea}</td>
            <td>${t.asignado}</td>
            <td><input type="date" value="${t.fechaInicio||''}" data-id="${t.id}" data-field="fechaInicio"></td>
            <td><input type="date" value="${t.fechaLimite||''}" data-id="${t.id}" data-field="fechaLimite"></td>
            <td><span class="pill ${pctClass(t.estado)}"><span class="dot"></span>${t.estado}</span></td>
            <td><button class="btn btn-green btn-sm save-row" data-id="${t.id}">Guardar</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;

  view.querySelectorAll('.save-row').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = parseInt(btn.dataset.id);
      const row = document.getElementById('row-'+id);
      const task = allTasks.find(t=>t.id===id);
      row.querySelectorAll('input[type=date]').forEach(inp=>{ task[inp.dataset.field] = inp.value || null; });
      await persistFechas(task);
      row.classList.add('row-saved');
      setTimeout(()=>row.classList.remove('row-saved'), 1200);
      showToast('Fechas actualizadas para: '+task.tarea);
    };
  });

}

/* =========================================================================
   EXPORTAR (SheetJS)
   ========================================================================= */
function exportTasks(tasks, filename){
  const data = tasks.map(t=>({
    Módulo:t.titulo, Tarea:t.tarea, Asignado:t.asignado,
    'Fecha inicio':fmtDate(t.fechaInicio), 'Fecha límite':fmtDate(t.fechaLimite),
    Estado:t.estado, Ciclo:cicloLabel(t.ciclo)
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:34},{wch:46},{wch:20},{wch:13},{wch:13},{wch:13},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Cierre Contable');
  XLSX.writeFile(wb, filename+'.xlsx');
}

/* =========================================================================
   TOAST
   ========================================================================= */
function showToast(msg, success=false){
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast' + (success?' success':'');
  t.innerHTML = (success?'🎉 ':'✓ ')+msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(),400); }, 4200);
}

/* =========================================================================
   INIT
   ========================================================================= */
(async function init(){
  await initAuth();
  await loadTareas();
  const cycles = getCycles();
  currentCycle = cycles[cycles.length-1] || null;
  renderAll();
})();
</script>
